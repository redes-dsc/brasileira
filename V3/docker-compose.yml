x-agent-common: &agent-common
  environment:
    <<: *common-env
  networks: [v3-net]
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "python -c \"import shared\""]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 25s

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    profiles: ["infra"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/localhost/2181'"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks: [v3-net]
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: ["infra"]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/localhost/9092'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [v3-net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-brasileira}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [v3-net]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["infra"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: brasileira_v3
      POSTGRES_USER: brasileira
      POSTGRES_PASSWORD: brasileira
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brasileira -d brasileira_v3"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks: [v3-net]
    restart: unless-stopped

  smart_router:
    <<: *agent-common
    profiles: ["dev", "prod"]
    build:
      context: .
      dockerfile: smart_router/Dockerfile

  worker_pool:
    <<: *agent-common
    profiles: ["dev", "prod"]
